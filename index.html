<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
      label,
      p {
        font-weight: 600;
      }
    </style>
    <title>Form Payment</title>
  </head>
  <body>
    <!-- Card of Payment -->
    <div class="container d-flex justify-content-center align-items-center" style="height: 100vh">
      <!-- Header -->
      <div class="card col-8 shadow"> <div class="card-header">
        <h2 class="h4 m-0 p-2">Payment form example</h2>
    </div>
        <!-- Form-Body -->
        <form>
          <div class="row card-body g-3 p-3">
            
            <div class="alert alert-danger fw-bold" role="alert">Some fileds are missing</div>
            
            <div class="col-md-5">
              <label for="inputCard4" class="form-label">Card #</label>
              <input type="text" class="form-control" id="inputCard4" placeholder="XXXXXXXXXXXXXXX" required/>
            </div>

            <div class="col-4 col-md-3">
              <label for="inputCVC4" class="form-label">CVC #</label>
              <input type="text" class="form-control" id="inputCVC4" placeholder="0000" required/>
            </div>

            <div class="col-8 col-md-4">
              <label for="inputAmount" class="form-label">Amount</label>
              <input type="number" class="form-control" id="inputAmount" placeholder="Amount" required/>
            </div>

            <div class="col-6">
              <label for="inputFirstName" class="form-label">First Name</label>
              <input type="text" class="form-control" id="inputFirstName" required />
            </div>

            <div class="col-6">
              <label for="inputLastName" class="form-label">Last Name</label>
              <input type="text" class="form-control" id="inputLastName" required />
            </div>

            <div class="col-6 col-md-6">
              <label for="inputCity" class="form-label">City</label>
              <input type="text" class="form-control" id="inputCity" required />
            </div>

            <div class="col-6 col-md-3">
              <label for="inputState" class="form-label">State</label>
              <select id="inputState" class="form-select" required>
                <option value="" selected disabled>Pick a state</option>
                <option value="FL">Florida</option>
                <option value="CA">California</option>
                <option value="TX">Texas</option>
              </select>
            </div>

            <div class="col-6 col-md-3">
              <label for="inputPostalCode" class="form-label">Postal Code</label>
              <input type="text" class="form-control" id="inputPostalCode" required />
            </div>

            <div class="col-6">
              <p>We accept:</p>
              <div class="input-group bg-secondary d-inline-flex w-auto rounded py-1 align-items-center justify-content-center">
                <div class="input pe-3 ps-2">
                  <label for="google">
                    <input id="google" checked name="options" type="radio" />
                    <i class="fa-brands fa-google-pay fa-xl"></i>
                  </label>
                </div>
                <div class="input pe-3">
                  <label for="visa">
                    <input id="visa" name="options" type="radio" />
                    <i class="fa-brands fa-cc-visa fa-xl"></i>
                  </label>
                </div>
                <div class="input pe-3">
                  <label for="paypal">
                    <input id="paypal" name="options" type="radio" />
                    <i class="fa-brands fa-paypal fa-xl"></i>
                  </label>
                </div>
              </div>
            </div>

            <div class="col-12 col-md-6">
              <p>Message</p>
              <textarea name="" id="" class="form-control w-100"></textarea>
            </div>

          </div>
          <!-- Footer -->
          <div class="col-12 card-footer py-3 d-flex justify-content-end pe-3 gap-2">
            <button type="button" class="btn btn-secondary">Cancel</button>
            <button type="submit" class="btn btn-primary">Send</button>
          </div>

        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
